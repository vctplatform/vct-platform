apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-worker
  labels:
    app: vct-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vct-worker
  template:
    metadata:
      labels:
        app: vct-worker
    spec:
      containers:
        - name: worker
          image: vct-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: vct-config
            - secretRef:
                name: vct-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
