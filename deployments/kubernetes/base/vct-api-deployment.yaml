apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-api
  labels:
    app: vct-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vct-api
  template:
    metadata:
      labels:
        app: vct-api
    spec:
      containers:
        - name: api
          image: vct-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18080
              name: http
          envFrom:
            - configMapRef:
                name: vct-config
            - secretRef:
                name: vct-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: 18080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
