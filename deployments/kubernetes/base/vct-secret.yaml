apiVersion: v1
kind: Secret
metadata:
  name: vct-secrets
  labels:
    app: vct-platform
type: Opaque
stringData:
  # MUST REPLACE THESE IN CI/CD OR OVERLAYS
  VCT_JWT_SECRET: "PLACEHOLDER_REPLACE_ME_IN_PRODUCTION_MUST_BE_32_CHARS"
  VCT_POSTGRES_URL: "postgres://user:pass@db-host:5432/vct?sslmode=disable"
  VCT_POSTGRES_REPLICA_URL: "postgres://user:pass@db-replica-host:5432/vct?sslmode=disable"
  VCT_NATS_URL: "nats://nats-host:4222"
  VCT_REDIS_URL: "redis://redis-host:6379"
