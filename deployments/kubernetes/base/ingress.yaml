apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vct-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.vct.vn
      secretName: vct-tls
  rules:
    - host: api.vct.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vct-api
                port:
                  number: 80
