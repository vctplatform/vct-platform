openapi: "3.1.0"
info:
  title: VCT Platform API
  version: "1.0.0"
  description: |
    API cho hệ thống quản lý giải đấu Vovinam (VCT).
    Backend generated từ spec này sẽ tạo Go structs và TS types tự động.
  contact:
    name: VCT Tech Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.vct.vn/api/v1
    description: Production

tags:
  - name: auth
    description: Xác thực & phiên làm việc
  - name: tournaments
    description: Quản lý giải đấu
  - name: teams
    description: Đơn vị / Đoàn tham gia
  - name: athletes
    description: Vận động viên
  - name: referees
    description: Trọng tài
  - name: arenas
    description: Sàn đấu
  - name: registration
    description: Đăng ký nội dung thi đấu
  - name: schedule
    description: Lịch thi đấu
  - name: combat
    description: Trận đấu Đối kháng
  - name: forms
    description: Lượt thi Quyền
  - name: results
    description: Kết quả thi đấu
  - name: medals
    description: Bảng huy chương
  - name: appeals
    description: Khiếu nại & Kháng nghị

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Kiểm tra trạng thái server
      responses:
        "200":
          description: Server hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      summary: Làm mới access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token mới
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"

  /auth/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Lấy thông tin người dùng hiện tại
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thông tin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /{entity}:
    get:
      operationId: listEntities
      summary: Danh sách entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
      responses:
        "200":
          description: Danh sách items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createEntity
      summary: Tạo entity mới
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Tạo thành công

  /{entity}/{id}:
    get:
      operationId: getEntity
      summary: Chi tiết entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Chi tiết item
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEntity
      summary: Cập nhật entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Cập nhật thành công
    delete:
      operationId: deleteEntity
      summary: Xóa entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Đã xóa

  /{entity}/bulk:
    put:
      operationId: bulkReplaceEntities
      summary: Thay thế toàn bộ entity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReplaceRequest"
      responses:
        "200":
          description: Thay thế thành công

  /{entity}/import:
    post:
      operationId: importEntities
      summary: Import dữ liệu hàng loạt
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Kết quả import
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportReport"

  /{entity}/export:
    get:
      operationId: exportEntities
      summary: Export dữ liệu
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EntityParam"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Dữ liệu export

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EntityParam:
      name: entity
      in: path
      required: true
      schema:
        type: string
        enum:
          - teams
          - athletes
          - registration
          - results
          - medals
          - brackets
          - schedule
          - arenas
          - referees
          - appeals
          - weigh-ins
          - combat-matches
          - form-performances
          - content-categories
          - referee-assignments
          - tournament-config
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Chưa xác thực hoặc token hết hạn
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: vct-backend
        time:
          type: string
          format: date-time

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
      required: [username, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    AuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [admin, btc, referee_manager, referee, delegate]

    BulkReplaceRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
      required: [items]

    ImportRequest:
      type: object
      properties:
        items:
          type: array
          items: {}
      required: [items]

    ImportReport:
      type: object
      properties:
        imported:
          type: array
          items:
            type: object
        rejected:
          type: array
          items:
            type: object
            properties:
              item: {}
              reason:
                type: string

    Tournament:
      type: object
      properties:
        id:
          type: string
        ten_giai:
          type: string
        ma_giai:
          type: string
        cap_do:
          type: string
          enum: [quoc_gia, khu_vuc, tinh, clb]
        trang_thai:
          type: string
          enum: [nhap, dang_ky, khoa_dk, thi_dau, ket_thuc]
        ngay_bat_dau:
          type: string
        ngay_ket_thuc:
          type: string
        dia_diem:
          type: string
      required: [ten_giai, ma_giai, trang_thai]

    Team:
      type: object
      properties:
        id:
          type: string
        ma:
          type: string
        ten:
          type: string
        tinh:
          type: string
        trang_thai:
          type: string
          enum: [nhap, cho_duyet, yeu_cau_bo_sung, da_xac_nhan, da_checkin, tu_choi]
      required: [ten, ma]

    Athlete:
      type: object
      properties:
        id:
          type: string
        ho_ten:
          type: string
        gioi:
          type: string
          enum: [nam, nu]
        ngay_sinh:
          type: string
        can_nang:
          type: number
        chieu_cao:
          type: number
        doan_id:
          type: string
        trang_thai:
          type: string
          enum: [du_dieu_kien, cho_xac_nhan, thieu_ho_so, nhap]
      required: [ho_ten, gioi, doan_id]

    Referee:
      type: object
      properties:
        id:
          type: string
        ho_ten:
          type: string
        gioi:
          type: string
          enum: [nam, nu]
        cap_bac:
          type: string
          enum: [quoc_gia, cap_1, cap_2, cap_3]
        chuyen_mon:
          type: string
          enum: [quyen, doi_khang, ca_hai]
      required: [ho_ten, cap_bac]
