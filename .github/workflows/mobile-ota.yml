name: Mobile OTA Update
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch'
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
      message:
        description: 'Update message'
        required: true
        type: string

jobs:
  ota-update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.branch == 'production' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Push OTA update
        run: |
          cd apps/expo && eas update \
            --branch ${{ github.event.inputs.branch }} \
            --message "${{ github.event.inputs.message }}" \
            --non-interactive

      - name: Verify update
        run: |
          cd apps/expo && eas update:list --branch ${{ github.event.inputs.branch }} --limit 1
