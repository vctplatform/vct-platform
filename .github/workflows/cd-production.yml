name: CD — Deploy to Production

on:
  release:
    types: [published]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t vct-backend:latest ./backend

      # TODO: Add production deployment steps (K8s rollout, database migrations)
      - name: Deploy to production
        run: echo "Production deploy steps to be configured"
