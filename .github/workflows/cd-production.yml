# ═══════════════════════════════════════════════════════
# VCT Platform — Deploy to Production
# Triggers on release publish → deploy backend to Fly.io
# + run database migrations
# ═══════════════════════════════════════════════════════

name: CD — Deploy to Production

on:
  release:
    types: [published]

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  deploy-backend:
    name: Deploy Backend → Fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  migrate-database:
    name: Run Database Migrations
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run migrations
        working-directory: backend
        run: go run ./cmd/migrate up
        env:
          VCT_POSTGRES_URL: ${{ secrets.NEON_DATABASE_URL }}

  verify-deployment:
    name: Verify Production Health
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://vct-platform-api.fly.dev/healthz || echo "000")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Health check returned $HTTP_STATUS"
          fi
