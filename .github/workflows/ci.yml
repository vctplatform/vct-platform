name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: npm ci

      - name: Authz contract check
        run: npm run authz:check

      - name: TypeScript typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Go vet
        run: cd backend && go vet ./...

      - name: Go test
        run: cd backend && go test ./...

      - name: Go build
        run: cd backend && go build -o /dev/null ./cmd/server

  backend-db-smoke:
    name: Backend DB Smoke (Migrate/Seed)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vct
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vct"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run migration lifecycle smoke test
        env:
          VCT_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/vct?sslmode=disable
        run: node scripts/run-backend-db-smoke.mjs
