name: CD — Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t vct-backend:staging ./backend

      # TODO: Add deployment steps for staging environment
      - name: Deploy to staging
        run: echo "Deploy steps to be configured"
