# ═══════════════════════════════════════════════════════
# VCT Platform — Deploy to Staging
# Triggers on push to develop → Render auto-deploys via
# render.yaml, this workflow runs tests + notifications
# ═══════════════════════════════════════════════════════

name: CD — Deploy to Staging

on:
  push:
    branches: [develop]

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  test-before-deploy:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run backend tests
        working-directory: backend
        run: go test ./... -race -count=1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & lint
        run: |
          npm run typecheck
          npm run lint

  # Render auto-deploys from 'develop' branch via render.yaml
  # This job just verifies the staging deployment health
  verify-staging:
    name: Verify Staging Health
    needs: test-before-deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Wait for Render deployment
        run: |
          echo "Render auto-deploys from develop branch."
          echo "Waiting 120s for deployment to complete..."
          sleep 120

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://vct-api-staging.onrender.com/healthz || echo "000")
          echo "Staging health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Staging health check returned $HTTP_STATUS — Render may still be deploying"
          fi
