# ═══════════════════════════════════════════════════════════════
# VCT Platform — Dependabot Configuration
# Automated dependency updates for security & maintenance
# ═══════════════════════════════════════════════════════════════

version: 2
updates:
  # ── NPM (Frontend + Shared Packages) ────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 10
    reviewers:
      - "vct-platform/maintainers"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(npm)"
    groups:
      # Group minor/patch updates together to reduce PR noise
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "next*"
      expo-ecosystem:
        patterns:
          - "expo*"
          - "@expo/*"
          - "react-native*"
          - "@react-native/*"
          - "@react-native-community/*"
          - "react-native-reanimated"
          - "react-native-gesture-handler"
          - "react-native-screens"
          - "react-native-safe-area-context"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # ── Go Modules (Backend) ────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    reviewers:
      - "vct-platform/maintainers"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(go)"

  # ── GitHub Actions ──────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"

  # ── Docker ──────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
