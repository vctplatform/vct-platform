# ════════════════════════════════════════
# VCT Platform — Development Configuration
# All services run locally with relaxed settings
# ════════════════════════════════════════

env: development
version: 0.0.0-dev

server:
  addr: ":18080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 5s
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8081"
    - "http://localhost:3101"

database:
  url: "postgres://vct_user:vct_pass@localhost:5432/vct_platform?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 30m
  auto_migrate: true

redis:
  addr: "localhost:6379"
  db: 0
  pool_size: 5

auth:
  token_expiry: 24h
  refresh_expiry: 720h  # 30 days
  bcrypt_cost: 10       # faster for dev

nats:
  url: "nats://localhost:4222"

storage:
  driver: local
  bucket: ./uploads

otel:
  enabled: false

logging:
  level: debug
  format: text  # human-readable for local dev

limits:
  rate_anonymous: 100  # relaxed for dev
  rate_user: 100
  rate_admin: 1000
  max_body_size: 10485760   # 10MB
  max_upload_size: 52428800 # 50MB
