apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-api
  labels:
    {{- include "vct.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
          env:
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: VCT_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: postgres-url
            - name: VCT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: redis-url
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vct-api
  labels:
    {{- include "vct.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: vct-api
