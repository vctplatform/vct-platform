{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-redis
  labels:
    {{- include "vct.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - {{ .Values.redis.config.maxmemory | quote }}
            - "--maxmemory-policy"
            - {{ .Values.redis.config.maxmemoryPolicy | quote }}
          ports:
            - containerPort: 6379
              name: redis
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vct-redis
  labels:
    {{- include "vct.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    app.kubernetes.io/name: vct-redis
{{- end }}
