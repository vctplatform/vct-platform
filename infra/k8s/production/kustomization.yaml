apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vct-production

resources:
  - ../base
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml
  - db-backup-cronjob.yaml

patches:
  # API: 3 replicas, higher resources
  - target:
      kind: Deployment
      name: vct-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # PostgreSQL: larger storage, higher limits
  - target:
      kind: StatefulSet
      name: vct-postgres
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4"

  # Redis: higher memory
  - target:
      kind: Deployment
      name: vct-redis
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
