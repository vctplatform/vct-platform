apiVersion: v1
kind: Service
metadata:
  name: vct-postgres
  labels:
    app.kubernetes.io/name: vct-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: vct-postgres
