apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vct-postgres
  labels:
    app.kubernetes.io/name: vct-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: vct-platform
spec:
  serviceName: vct-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: vct_platform
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - vct_platform
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - vct_platform
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
