apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-redis
  labels:
    app.kubernetes.io/name: vct-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: vct-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vct-redis
  labels:
    app.kubernetes.io/name: vct-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    app.kubernetes.io/name: vct-redis
