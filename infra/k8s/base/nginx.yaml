apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-nginx
  labels:
    app.kubernetes.io/name: vct-nginx
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: vct-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-nginx
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: nginx
          image: ghcr.io/vct-platform/nginx:latest
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vct-nginx
  labels:
    app.kubernetes.io/name: vct-nginx
    app.kubernetes.io/component: gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      name: http
    - port: 443
      targetPort: https
      name: https
  selector:
    app.kubernetes.io/name: vct-nginx
