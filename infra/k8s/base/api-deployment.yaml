apiVersion: apps/v1
kind: Deployment
metadata:
  name: vct-api
  labels:
    app.kubernetes.io/name: vct-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: vct-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vct-api
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: vct-api
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: vct-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: vct-api
      containers:
        - name: api
          image: ghcr.io/vct-platform/backend:latest
          ports:
            - containerPort: 18080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: VCT_ENV
              value: production
            - name: VCT_BACKEND_ADDR
              value: ":18080"
            - name: VCT_STORAGE_DRIVER
              value: postgres
            - name: VCT_POSTGRES_PROVIDER
              value: selfhost
            - name: VCT_DB_AUTO_MIGRATE
              value: "false"
            - name: VCT_CACHE_TTL
              value: "30s"
            - name: VCT_CACHE_MAX_ENTRIES
              value: "2000"
            - name: VCT_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: postgres-url
            - name: VCT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vct-secrets
                  key: redis-url
            - name: NATS_URL
              value: "nats://vct-nats:4222"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always

