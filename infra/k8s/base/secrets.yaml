# VCT Platform — Secrets Template
# Apply with: kubectl create secret generic vct-secrets --from-env-file=.env.k8s -n vct-platform
#
# Or create manually:
# kubectl create secret generic vct-secrets \
#   --from-literal=postgres-url='postgres://user:pass@vct-postgres:5432/vct_platform?sslmode=disable' \
#   --from-literal=postgres-user='vct_user' \
#   --from-literal=postgres-password='CHANGE_ME' \
#   --from-literal=jwt-secret='CHANGE_ME_MIN_32_CHARS' \
#   --from-literal=redis-url='redis://vct-redis:6379' \
#   -n vct-platform

apiVersion: v1
kind: Secret
metadata:
  name: vct-secrets
  labels:
    app.kubernetes.io/part-of: vct-platform
type: Opaque
stringData:
  postgres-url: "postgres://vct_user:CHANGE_ME@vct-postgres:5432/vct_platform?sslmode=disable"
  postgres-user: "vct_user"
  postgres-password: "CHANGE_ME"
  jwt-secret: "CHANGE_ME_MINIMUM_32_CHARACTERS_LONG"
  redis-url: "redis://vct-redis:6379"
