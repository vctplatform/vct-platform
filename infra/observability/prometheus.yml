# Prometheus configuration for VCT Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules.yaml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vct-api
    static_configs:
      - targets: ["host.docker.internal:18080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
