[databases]
vct_platform = host=postgres port=5432 dbname=vct_platform

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Pool Mode ──────────────────────────────────────────────────
; transaction = release connection after each transaction (best for Go pgxpool)
pool_mode = transaction

; ── Pool Sizing ────────────────────────────────────────────────
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; ── Connection Limits ──────────────────────────────────────────
max_client_conn = 200
max_db_connections = 50

; ── Timeouts ───────────────────────────────────────────────────
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 5
query_timeout = 30
query_wait_timeout = 120
client_idle_timeout = 0

; ── Logging ────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; ── Admin ──────────────────────────────────────────────────────
admin_users = vct_admin,vct_user
stats_users = vct_admin,vct_user
