# VCT Platform — Prometheus Alert Rules

groups:
  - name: vct_database
    rules:
      # PostgreSQL is down
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter cannot reach the database for > 1 minute."

      # Connection usage > 80%
      - alert: PostgreSQLHighConnections
        expr: (pg_stat_activity_count / pg_settings_max_connections) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection usage > 80%"
          description: "{{ $value | humanize }}% of max connections used."

      # Cache hit ratio < 95%
      - alert: PostgreSQLLowCacheHitRatio
        expr: pg_stat_database_blks_hit / (pg_stat_database_blks_hit + pg_stat_database_blks_read) < 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL cache hit ratio below 95%"
          description: "Cache hit ratio is {{ $value | humanize }}%. Consider increasing shared_buffers."

      # Database size growing fast (> 5GB)
      - alert: PostgreSQLDatabaseSizeLarge
        expr: pg_database_size_bytes > 5e+09
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL database size exceeds 5GB"
          description: "Database size is {{ $value | humanizeBytes }}."

  - name: vct_services
    rules:
      # Backend API is down
      - alert: BackendAPIDown
        expr: up{job="vct-backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "VCT Backend API is down"
          description: "Backend health endpoint unreachable for > 30 seconds."

      # Redis is down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis is unreachable for > 1 minute. Caching and sessions will fail."

      # High memory usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 450
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service memory usage > 450MB"
          description: "{{ $labels.job }} is using {{ $value | humanize }}MB of memory."
