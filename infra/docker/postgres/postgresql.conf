# ═══════════════════════════════════════════════════════════════
# VCT Platform — PostgreSQL 17 Production Configuration
# Mount via: -c config_file=/etc/postgresql/postgresql.conf
# ═══════════════════════════════════════════════════════════════

# ── Memory (adjust to server RAM — values below suit 1–2 GB) ──
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 64MB

# ── WAL & Checkpoints ────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# ── Connection Limits ────────────────────────────────────────
max_connections = 100
superuser_reserved_connections = 3

# ── Query Planner ────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Logging ──────────────────────────────────────────────────
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_timezone = 'Asia/Ho_Chi_Minh'

# ── Locale ───────────────────────────────────────────────────
timezone = 'Asia/Ho_Chi_Minh'
lc_messages = 'en_US.utf8'

# ── Autovacuum ───────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60

# ── Listen ───────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
