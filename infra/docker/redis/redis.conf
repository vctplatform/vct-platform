# VCT Platform — Redis Configuration (Production)
# Mounted into Redis container at /usr/local/etc/redis/redis.conf

# ── Network ──────────────────────────────────────
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Memory ───────────────────────────────────────
maxmemory 200mb
maxmemory-policy allkeys-lru

# ── Persistence: RDB Snapshots ───────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data
rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes

# ── Persistence: AOF ────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ── Security ─────────────────────────────────────
# Password set via command line --requirepass
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "VCT_CONFIG_a8f3e2"

# ── Logging ──────────────────────────────────────
loglevel notice
logfile ""

# ── Performance ──────────────────────────────────
hz 10
dynamic-hz yes
activedefrag yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
