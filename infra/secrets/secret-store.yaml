# ════════════════════════════════════════
# External Secrets Operator — SecretStore
# Connects to GCP Secret Manager
# ════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: ${GCP_PROJECT_ID}
      auth:
        workloadIdentity:
          clusterLocation: asia-southeast1
          clusterName: vct-production-gke
          serviceAccountRef:
            name: external-secrets-sa
            namespace: vct-production
---
# Service account for workload identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: vct-production
  annotations:
    iam.gke.io/gcp-service-account: external-secrets@${GCP_PROJECT_ID}.iam.gserviceaccount.com
