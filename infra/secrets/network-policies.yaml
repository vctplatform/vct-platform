# ════════════════════════════════════════
# Kubernetes Network Policies — VCT Platform
# Zero-trust: deny all, then allow specific flows
# ════════════════════════════════════════

# Default deny all ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vct-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# API → PostgreSQL (port 5432)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-postgres
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vct-postgres
      ports:
        - port: 5432
          protocol: TCP
---
# API → Redis (port 6379)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-redis
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vct-redis
      ports:
        - port: 6379
          protocol: TCP
---
# API → NATS (port 4222)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-nats
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vct-nats
      ports:
        - port: 4222
          protocol: TCP
---
# API → OTel Collector (ports 4317, 4318)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-otel
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# Nginx → API (port 18080)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-to-api
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-nginx
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vct-api
      ports:
        - port: 18080
          protocol: TCP
---
# Nginx accepts external traffic (ports 80, 443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-ingress
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-nginx
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
---
# API accepts traffic from Nginx only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-ingress
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vct-nginx
      ports:
        - port: 18080
          protocol: TCP
---
# API → DNS (kube-dns, port 53) for service discovery
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-dns
  namespace: vct-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vct-api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
