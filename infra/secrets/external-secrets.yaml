# ════════════════════════════════════════
# External Secrets — VCT Platform Secrets
# Syncs secrets from GCP Secret Manager → K8s Secrets
# ════════════════════════════════════════
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vct-database-secrets
  namespace: vct-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: vct-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        POSTGRES_URL: "postgres://{{ .pg_user }}:{{ .pg_password }}@vct-postgres:5432/{{ .pg_database }}?sslmode=require"
  data:
    - secretKey: pg_user
      remoteRef:
        key: vct-postgres-user
    - secretKey: pg_password
      remoteRef:
        key: vct-postgres-password
    - secretKey: pg_database
      remoteRef:
        key: vct-postgres-database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vct-app-secrets
  namespace: vct-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: vct-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: vct-jwt-secret
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: vct-redis-password
    - secretKey: NATS_TOKEN
      remoteRef:
        key: vct-nats-token
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: vct-minio-access-key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: vct-minio-secret-key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: vct-encryption-key
