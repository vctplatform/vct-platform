# VCT Platform — Production Docker Compose
# Use for production-like environments with production settings

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    build:
      context: ./infra/docker/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_data:/var/www/certbot:ro
      - ssl_certs:/etc/nginx/ssl
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vct-frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Go Backend API ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "18080"
    environment:
      - VCT_ENV=production
      - VCT_BACKEND_ADDR=:18080
      - VCT_CORS_ORIGINS=${VCT_CORS_ORIGINS}
      - VCT_ALLOW_DEMO_USERS=false
      - VCT_BOOTSTRAP_USERS_JSON=${VCT_BOOTSTRAP_USERS_JSON}
      - VCT_JWT_SECRET=${VCT_JWT_SECRET}
      - VCT_JWT_ISSUER=${VCT_JWT_ISSUER:-vct-backend}
      - VCT_ACCESS_TTL=${VCT_ACCESS_TTL:-15m}
      - VCT_REFRESH_TTL=${VCT_REFRESH_TTL:-168h}
      - VCT_STORAGE_DRIVER=postgres
      - VCT_POSTGRES_PROVIDER=selfhost
      - VCT_POSTGRES_URL=postgres://vct_user:${DB_PASSWORD}@pgbouncer:6432/vct_platform?sslmode=disable
      - VCT_DB_AUTO_MIGRATE=${VCT_DB_AUTO_MIGRATE:-false}
      - VCT_CACHE_TTL=${VCT_CACHE_TTL:-30s}
      - VCT_CACHE_MAX_ENTRIES=${VCT_CACHE_MAX_ENTRIES:-2000}
      - VCT_PG_POOL_MAX_CONNS=${VCT_PG_POOL_MAX_CONNS:-25}
      - VCT_PG_POOL_MIN_CONNS=${VCT_PG_POOL_MIN_CONNS:-5}
      - VCT_PG_POOL_MAX_IDLE_TIME=${VCT_PG_POOL_MAX_IDLE_TIME:-30m}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NATS_URL=nats://nats:4222
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - vct-frontend
      - vct-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18080/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Database Migration Runner (one-shot) ────────────────────
  migrate:
    image: postgres:17-alpine
    volumes:
      - ./infra/scripts/migrate.sh:/migrate.sh:ro
      - ./backend/migrations:/migrations:ro
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vct_platform
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD}
      MIGRATION_DIR: /migrations
    entrypoint: ["/bin/sh", "/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct-database
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    build:
      context: ./infra/docker/postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal-archive
    environment:
      POSTGRES_DB: vct_platform
      POSTGRES_USER: vct_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - vct-database
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vct_user -d vct_platform" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database Backup (daily at 2 AM) ────────────────────────
  db-backup:
    image: postgres:17-alpine
    volumes:
      - ./infra/scripts/backup.sh:/backup.sh:ro
      - ./infra/scripts/backup-verify.sh:/backup-verify.sh:ro
      - backup_data:/backups
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vct_platform
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_DIR: /backups
      RETAIN_DAILY: "7"
      RETAIN_WEEKLY: "4"
    entrypoint: >
      /bin/sh -c "
        chmod +x /backup.sh /backup-verify.sh &&
        echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1 && /backup-verify.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct-database
    restart: unless-stopped

  # ── PgBouncer — Connection Pooler ───────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p3
    volumes:
      - ./infra/docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/docker/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    environment:
      PGBOUNCER_USER: vct_user
      PGBOUNCER_PASSWORD: ${DB_PASSWORD}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct-backend
      - vct-database
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - vct-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    networks:
      - vct-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ── NATS ───────────────────────────────────────────────────
  nats:
    image: nats:latest
    command: "--jetstream --store_dir /data"
    volumes:
      - nats_data:/data
    networks:
      - vct-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ── Meilisearch ────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    networks:
      - vct-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # Monitoring Stack (profile: monitoring)
  # ══════════════════════════════════════════════════════════

  # ── postgres_exporter ──────────────────────────────────────
  pg-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://vct_user:${DB_PASSWORD}@postgres:5432/vct_platform?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct-database
      - vct-monitoring
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - vct-monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/docker/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_HTTP_PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - vct-monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Loki — Log Aggregation ─────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - vct-monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Promtail — Log Collector ───────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./infra/docker/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - vct-monitoring
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    profiles:
      - monitoring

# ══════════════════════════════════════════════════════════
# Networks (3-tier isolation)
# ══════════════════════════════════════════════════════════
networks:
  vct-frontend:
    driver: bridge
    name: vct-frontend
  vct-backend:
    driver: bridge
    name: vct-backend
    internal: true
  vct-database:
    driver: bridge
    name: vct-database
    internal: true
  vct-monitoring:
    driver: bridge
    name: vct-monitoring
    internal: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nats_data:
  meili_data:
  backup_data:
  prometheus_data:
  grafana_data:
  loki_data:
  wal_archive:
  certbot_data:
  ssl_certs:
