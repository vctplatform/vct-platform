# VCT Platform — Production Docker Compose
# Use for production-like environments with production settings

services:
  # ── Go Backend API ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    environment:
      - VCT_ENV=production
      - VCT_BACKEND_ADDR=:18080
      - VCT_CORS_ORIGINS=${VCT_CORS_ORIGINS}
      - VCT_ALLOW_DEMO_USERS=false
      - VCT_BOOTSTRAP_USERS_JSON=${VCT_BOOTSTRAP_USERS_JSON}
      - VCT_JWT_SECRET=${VCT_JWT_SECRET}
      - VCT_JWT_ISSUER=${VCT_JWT_ISSUER:-vct-backend}
      - VCT_ACCESS_TTL=${VCT_ACCESS_TTL:-15m}
      - VCT_REFRESH_TTL=${VCT_REFRESH_TTL:-168h}
      - VCT_STORAGE_DRIVER=postgres
      - VCT_POSTGRES_PROVIDER=selfhost
      - VCT_POSTGRES_URL=postgres://vct_user:${DB_PASSWORD}@postgres:5432/vct_platform?sslmode=require
      - VCT_DB_AUTO_MIGRATE=${VCT_DB_AUTO_MIGRATE:-false}
      - VCT_CACHE_TTL=${VCT_CACHE_TTL:-30s}
      - VCT_CACHE_MAX_ENTRIES=${VCT_CACHE_MAX_ENTRIES:-2000}
      - VCT_PG_POOL_MAX_CONNS=${VCT_PG_POOL_MAX_CONNS:-25}
      - VCT_PG_POOL_MIN_CONNS=${VCT_PG_POOL_MIN_CONNS:-5}
      - VCT_PG_POOL_MAX_IDLE_TIME=${VCT_PG_POOL_MAX_IDLE_TIME:-30m}
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18080/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    build:
      context: ./infra/docker/postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vct_platform
      POSTGRES_USER: vct_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vct_user -d vct_platform" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ── NATS ───────────────────────────────────────────────────
  nats:
    image: nats:latest
    command: "--jetstream --store_dir /data"
    volumes:
      - nats_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

  # ── Meilisearch ────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nats_data:
  meili_data:
